name: release-linux

# Phase 9 / Strategy A: build distributable manylinux_2_28 wheels for Linux
# x86-64 (cp311-cp314) with V8 linked. Triggered by a version tag (real release)
# or manually. The V8 monolith is cached across runs.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# Serialize runs of this workflow: the V8 monolith cache is keyed on the build
# scripts + pin, so two overlapping runs (e.g. a re-dispatch) share one key. A
# cache being created by an in-flight run is NOT visible to a concurrent run, so
# the second run would cache-miss and rebuild V8 (~40 min) and then fail to save
# ("another job may be creating this cache"). Queue instead — cancel-in-progress:
# false lets the in-flight run finish and populate the cache, so the next run
# hits it. (This is cache contention, not eviction; total cache usage is small.)
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write  # create a GitHub Release and attach wheels on tag builds

env:
  # Pinned by digest for reproducibility (dependency_strategy.md §5.1).
  # quay.io/pypa/manylinux_2_28_x86_64 (resolved 2026-07-17).
  MANYLINUX_IMAGE: quay.io/pypa/manylinux_2_28_x86_64@sha256:b04887b645dde99b9e955aeae3ff4da414992d0bd88259f046295b56361c5614

jobs:
  linux-wheels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # V8 monolith restore with a one-shot retry. A transient GitHub cache-service
      # error (observed: "GetCacheEntryDownloadURL: (404) workflow run not found")
      # is reported by actions/cache as a non-retryable MISS even though the cache
      # is present, which would trigger a needless ~40-min V8 rebuild. Retry the
      # restore once (after a short pause) before deciding to build; save only after
      # a real build. Keys/paths are unchanged.
      - name: Restore V8 monolith cache (attempt 1)
        id: v8cache
        uses: actions/cache/restore@v4
        with:
          path: data/v8
          key: v8-manylinux2_28-${{ hashFiles('tools/build_v8_manylinux.sh', 'cmake/v8_pin.cmake') }}

      - name: Pause before cache retry
        if: steps.v8cache.outputs.cache-hit != 'true'
        run: sleep 30

      - name: Restore V8 monolith cache (attempt 2 — beat transient 404s)
        id: v8cache2
        if: steps.v8cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: data/v8
          key: v8-manylinux2_28-${{ hashFiles('tools/build_v8_manylinux.sh', 'cmake/v8_pin.cmake') }}

      - name: Build V8 monolith in manylinux container (only if truly absent)
        id: v8build
        if: steps.v8cache.outputs.cache-hit != 'true' && steps.v8cache2.outputs.cache-hit != 'true'
        run: |
          docker run --rm -v "$PWD":/io "$MANYLINUX_IMAGE" \
            bash /io/tools/build_v8_manylinux.sh
          sudo chown -R "$(id -u):$(id -g)" data/v8

      - name: Save V8 monolith cache (only after a real build)
        if: steps.v8build.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: data/v8
          key: v8-manylinux2_28-${{ hashFiles('tools/build_v8_manylinux.sh', 'cmake/v8_pin.cmake') }}

      - name: Build + repair + test wheels (cp311-cp314)
        run: |
          docker run --rm -v "$PWD":/io "$MANYLINUX_IMAGE" \
            bash /io/tools/build_linux_wheels.sh
          sudo chown -R "$(id -u):$(id -g)" wheelhouse dist || true

      - name: Show wheel + license metadata
        run: |
          ls -la wheelhouse
          cat data/v8/BUILD_INFO.txt
          echo "--- bundled licenses ---"
          ls -la data/v8/licenses || echo "(none)"

      - uses: actions/upload-artifact@v4
        with:
          name: iv8-linux-manylinux2_28-wheels
          path: wheelhouse/*.whl
          if-no-files-found: error

      - name: Publish GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: wheelhouse/*.whl
          generate_release_notes: true
