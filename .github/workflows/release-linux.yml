name: release-linux

# Phase 9 / Strategy A: build distributable manylinux_2_28 wheels for Linux
# x86-64 (cp311-cp314) with V8 linked. Manual trigger only (the V8 build is
# long); the monolith is cached across runs.
#
# TODO(hardening): pin the manylinux image by @sha256 digest (dependency_strategy
# §5.1) once a digest is chosen.

on:
  workflow_dispatch:
  # Bring-up trigger: run when the Phase 9 build inputs change (no gh/token
  # available locally to dispatch manually). Tighten to tags for real releases.
  push:
    paths:
      - 'tools/build_v8_manylinux.sh'
      - 'tools/build_linux_wheels.sh'
      - '.github/workflows/release-linux.yml'
      - 'cmake/v8_pin.cmake'

env:
  MANYLINUX_IMAGE: quay.io/pypa/manylinux_2_28_x86_64

jobs:
  linux-wheels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache V8 monolith (manylinux)
        id: v8cache
        uses: actions/cache@v4
        with:
          path: data/v8
          key: v8-manylinux2_28-${{ hashFiles('tools/build_v8_manylinux.sh', 'cmake/v8_pin.cmake') }}

      - name: Build V8 monolith in manylinux container (cache miss only)
        if: steps.v8cache.outputs.cache-hit != 'true'
        run: |
          docker run --rm -v "$PWD":/io "$MANYLINUX_IMAGE" \
            bash /io/tools/build_v8_manylinux.sh
          sudo chown -R "$(id -u):$(id -g)" data/v8

      - name: Build + repair + test wheels (cp311-cp314)
        run: |
          docker run --rm -v "$PWD":/io "$MANYLINUX_IMAGE" \
            bash /io/tools/build_linux_wheels.sh
          sudo chown -R "$(id -u):$(id -g)" wheelhouse dist || true

      - name: Show wheel metadata
        run: |
          ls -la wheelhouse
          cat data/v8/BUILD_INFO.txt

      - uses: actions/upload-artifact@v4
        with:
          name: iv8-linux-manylinux2_28-wheels
          path: wheelhouse/*.whl
          if-no-files-found: error
