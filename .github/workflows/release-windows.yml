name: release-windows

# Phase 9 / C: build Windows x64 wheels (cp311-cp314) with V8 linked, on
# GitHub's windows-latest runner (local Windows depot_tools is blocked by
# background/console constraints in the dev harness). V8 monolith is cached.
# macOS is intentionally NOT built.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# Serialize runs of this workflow so overlapping runs don't race the V8 monolith
# cache (a cache being created by an in-flight run is invisible to a concurrent
# run -> needless rebuild + "another job may be creating this cache" on save).
# cancel-in-progress: false queues the newer run until the in-flight one finishes
# and populates the cache, so the next run hits it. See release-linux.yml.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-v8:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      # Restore with retries (up to 4 attempts): a transient cache-service 404 is
      # reported as a non-retryable MISS and would trigger a needless ~40-min
      # rebuild. The composite action retries before building; save only after a
      # real build. See release-linux.yml. Keys/paths unchanged.
      - name: Restore V8 monolith cache (with retries)
        id: v8cache
        uses: ./.github/actions/restore-v8-cache
        with:
          path: data/v8
          key: v8-win-x64-${{ hashFiles('tools/fetch_v8_windows.bat', 'tools/build_v8_windows.bat', 'cmake/v8_pin.cmake') }}
      - name: Fetch + build V8 monolith (only if truly absent)
        id: v8build
        if: steps.v8cache.outputs.cache-hit != 'true'
        shell: cmd
        env:
          WORK: C:\v8
        run: |
          call tools\fetch_v8_windows.bat || exit /b 1
          call tools\build_v8_windows.bat || exit /b 1
      - name: Save V8 monolith cache (only after a real build)
        if: steps.v8build.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: data/v8
          key: v8-win-x64-${{ hashFiles('tools/fetch_v8_windows.bat', 'tools/build_v8_windows.bat', 'cmake/v8_pin.cmake') }}

  wheels:
    needs: build-v8
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        python: ['3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4
      # Restore-only (build-v8 populated it). Retries so a transient cache 404
      # doesn't hard-fail the wheel build; if the cache is genuinely absent after
      # all attempts, fail with a clear message (was fail-on-cache-miss: true).
      - name: Restore V8 monolith cache (with retries)
        id: v8cache
        uses: ./.github/actions/restore-v8-cache
        with:
          path: data/v8
          key: v8-win-x64-${{ hashFiles('tools/fetch_v8_windows.bat', 'tools/build_v8_windows.bat', 'cmake/v8_pin.cmake') }}
      - name: Fail if V8 cache is absent after retries
        if: steps.v8cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          echo "::error::V8 monolith cache missing after retries (build-v8 should have populated it)."
          exit 1
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Put clang-cl on PATH
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\LLVM\bin"
      - name: Build + repair + test wheel
        shell: pwsh
        env:
          # Force Ninja + clang-cl (the pyproject win32 override sets clang-cl).
          # The default VS/MSBuild generator did not apply /std:c++20 to the V8
          # headers ("C++20 or later required").
          CMAKE_GENERATOR: Ninja
        run: |
          python -m pip install --upgrade pip delvewheel "pytest>=7"
          python -m pip wheel . --no-deps -w dist
          $whl = (Get-ChildItem dist\*.whl)[0].FullName
          python -m delvewheel repair "$whl" -w wheelhouse
          $rep = (Get-ChildItem wheelhouse\*.whl)[0].FullName
          python -m pip install "$rep"
          Push-Location $env:RUNNER_TEMP
          python -c "import iv8; assert iv8._v8_linked, 'V8 not linked'; print('win', iv8._v8_runtime_version)"
          python -m pytest "$env:GITHUB_WORKSPACE\test"
          Pop-Location
      - uses: actions/upload-artifact@v4
        with:
          name: iv8-windows-wheel-cp${{ matrix.python }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  publish:
    needs: wheels
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all Windows wheels
        uses: actions/download-artifact@v4
        with:
          pattern: iv8-windows-wheel-*
          path: dist
          merge-multiple: true
      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
